# finsight — Supabase config
# Branching의 "Configure" 단계가 이 파일을 읽어 브랜치 인스턴스에 적용한다.
# (로컬 `supabase start`에도 동일하게 쓰인다.)
# 프로덕션 대시보드 설정과 어긋나면 브랜치가 프로덕션과 달라지므로, 변경 시 동기화할 것.
# `supabase init` 기본값 + finsight 조정(seed 활성화 / Postgres 17).

project_id = "finsight"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
# RPC/REST 한 응답 최대 행 수 — 대용량 명세서 방어와 별개의 PostgREST 페이징 상한.
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# 프로덕션과 동일(현재 prod = 17.6).
major_version = 17

# 새 브랜치는 데이터 0으로 시작한다. seed.sql로 합성 데이터를 주입해
# 로그인 가능한 데모 계정 + 대시보드가 채워진 상태로 만든다.
[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

# 로컬 메일 캐처(이메일 확인/매직링크 미리보기). 브랜치에선 무해.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# 로컬/브랜치 기준값. 브랜치 미리보기 URL은 통합 설정에서 별도 관리.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# 데모 계정으로 바로 로그인 검증할 수 있게 이메일 회원가입 허용.
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# 브랜치에서 데모 계정 즉시 로그인 위해 이메일 확인 비활성(seed가 email_confirmed_at 채움).
enable_confirmations = false

# finsight 본 인증은 구글 OAuth다. 브랜치에서 OAuth까지 미러링하려면 아래 주석을 풀고,
# 브랜치 secrets에 SUPABASE_AUTH_GOOGLE_CLIENT_ID / _SECRET 를 설정하라.
# 시크릿 없이 enabled=true면 Configure 단계가 실패하므로 기본은 비활성으로 둔다.
# [auth.external.google]
# enabled = true
# client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[edge_runtime]
enabled = true
