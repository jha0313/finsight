<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage — AI financial intelligence</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #fff; }
  #root { min-height: 100vh; }

  /* responsive collapse */
  .nav-mobile { display: none; }
  @media (max-width: 880px) {
    .nav-desktop { display: none !important; }
    .nav-mobile { display: flex !important; }
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-cards { min-height: 300px !important; }
    .hero-h1 { font-size: 52px !important; }
    .feat-grid { grid-template-columns: 1fr !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: repeat(2,1fr) !important; }
  }
  @media (max-width: 520px) {
    .hero-h1 { font-size: 40px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Signup.jsx"></script>

<script type="text/babel" data-presets="react">
  const App = () => {
    const [screen, setScreen] = React.useState("home");
    const go = (s) => { setScreen(s); window.scrollTo(0, 0); };

    if (screen === "signup") return <SignupScreen onBack={() => go("home")} onDone={() => go("confirm")} />;
    if (screen === "confirm") return <ConfirmScreen onBack={() => go("home")} />;

    return (
      <div>
        <div style={{ background: "#0a0b0d" }}>
          <TopNav dark onNav={go} />
          <HeroDark onNav={go} />
        </div>
        <FeatureGrid />
        <AssetTable />
        <PricingTiers />
        <CTABand onNav={go} />
        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
