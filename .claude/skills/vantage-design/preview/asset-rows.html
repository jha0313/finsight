<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--canvas)}
  .arow{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--hairline)}
  .arow:last-child{border-bottom:none}
  .glyph{width:32px;height:32px;flex:none;border-radius:var(--radius-full);background:var(--surface-strong);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:14px;color:var(--ink)}
  .glyph.btc{background:rgba(244,176,0,.16);color:#b07e00}
  .name{flex:1;display:flex;flex-direction:column}
  .n1{font-weight:600;font-size:16px;color:var(--ink)}
  .n2{font-size:13px;color:var(--muted)}
  .price{width:120px;text-align:right;color:var(--ink)}
  .chg{width:90px;text-align:right}
</style>
</head>
<body>
<div class="card">
  <div class="arow">
    <span class="glyph btc">₿</span>
    <span class="name"><span class="n1">Bitcoin</span><span class="n2">BTC</span></span>
    <span class="price num" style="color:var(--ink)">$67,412.08</span>
    <span class="chg num up">+2.41%</span>
  </div>
  <div class="arow">
    <span class="glyph">Ξ</span>
    <span class="name"><span class="n1">Ethereum</span><span class="n2">ETH</span></span>
    <span class="price num" style="color:var(--ink)">$3,188.40</span>
    <span class="chg num down">−1.08%</span>
  </div>
  <div class="arow">
    <span class="glyph">S</span>
    <span class="name"><span class="n1">Solana</span><span class="n2">SOL</span></span>
    <span class="price num" style="color:var(--ink)">$172.95</span>
    <span class="chg num up">+5.20%</span>
  </div>
</div>
</body>
</html>
