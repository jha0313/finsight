<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--canvas);display:flex;gap:20px;align-items:flex-start}
  .col{flex:1;display:flex;flex-direction:column;gap:14px}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .input{height:48px;box-sizing:border-box;border:1px solid var(--hairline);border-radius:var(--radius-md);padding:14px 16px;font-family:var(--font-sans);font-size:15px;color:var(--ink);width:100%}
  .input.focus{border:2px solid var(--primary);padding:13px 15px}
  .input::placeholder{color:var(--muted-soft)}
  .search{height:44px;box-sizing:border-box;display:flex;align-items:center;gap:10px;background:var(--surface-strong);border-radius:var(--radius-pill);padding:12px 20px;color:var(--muted);font-size:15px}
</style>
</head>
<body>
<div class="card">
  <div class="col">
    <span class="lbl">text-input · default</span>
    <input class="input" placeholder="you@company.com" />
    <span class="lbl">text-input · focus (2px blue)</span>
    <input class="input focus" value="you@company.com" />
  </div>
  <div class="col">
    <span class="lbl">search-input-pill</span>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Search assets
    </div>
  </div>
</div>
</body>
</html>
