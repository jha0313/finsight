<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--surface-soft);display:flex;gap:16px}
  .fc{flex:1;background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--radius-xl);padding:28px}
  .ic{width:44px;height:44px;border-radius:var(--radius-full);background:var(--surface-strong);display:flex;align-items:center;justify-content:center;color:var(--primary);margin-bottom:18px}
  .t{font-weight:600;font-size:18px;color:var(--ink);margin:0 0 8px}
  .b{font-size:14px;line-height:1.5;color:var(--body);margin:0}
</style>
</head>
<body>
<div class="card">
  <div class="fc">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></div>
    <p class="t">Signals, explained</p>
    <p class="b">Every AI insight comes with the reasoning behind it — never a black-box score.</p>
  </div>
  <div class="fc">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <p class="t">Institutional-grade</p>
    <p class="b">Custody, audit trails, and controls built for desks that answer to regulators.</p>
  </div>
  <div class="fc">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
    <p class="t">Always watching</p>
    <p class="b">Continuous monitoring surfaces drift the moment it matters, not at month-end.</p>
  </div>
</div>
</body>
</html>
