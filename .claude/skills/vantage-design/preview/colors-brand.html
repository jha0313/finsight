<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:24px;background:var(--canvas);font-family:var(--font-sans)}
  .row{display:flex;gap:12px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-lg);border:1px solid var(--hairline)}
  .meta{display:flex;flex-direction:column;gap:1px}
  .nm{font-size:13px;font-weight:600;color:var(--ink)}
  .hx{font-family:var(--font-mono);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="meta"><span class="nm">Vantage Blue</span><span class="hx">--primary · #0052ff</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-active)"></div><div class="meta"><span class="nm">Blue Active</span><span class="hx">--primary-active · #003ecc</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-disabled)"></div><div class="meta"><span class="nm">Blue Disabled</span><span class="hx">--primary-disabled · #a8b8cc</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-yellow)"></div><div class="meta"><span class="nm">Accent Yellow</span><span class="hx">--accent-yellow · #f4b000</span></div></div>
  </div>
</div>
</body>
</html>
