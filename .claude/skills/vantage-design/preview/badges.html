<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--canvas);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .badge{font-family:var(--font-sans);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;background:var(--surface-strong);color:var(--ink);border-radius:var(--radius-pill);padding:6px 14px}
  .badge.dark{background:var(--surface-dark-elevated);color:var(--on-dark)}
  .badge.blue{background:rgba(0,82,255,.1);color:var(--primary)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:100%;margin:0}
</style>
</head>
<body>
<div class="card">
  <p class="lbl">badge-pill · caption-strong · uppercase</p>
  <span class="badge">Institutional</span>
  <span class="badge">Regulated</span>
  <span class="badge blue">AI Insight</span>
  <span class="badge dark">New</span>
</div>
</body>
</html>
