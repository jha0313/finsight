<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--canvas)}
  .spec{display:flex;align-items:baseline;gap:14px;padding:6px 0}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:120px;flex:none}
</style>
</head>
<body>
<div class="card">
  <div class="spec"><span class="tag">display-mega · 80</span><span class="display-mega" style="font-size:52px">Vantage</span></div>
  <div class="spec"><span class="tag">display-lg · 52</span><span class="display-lg" style="font-size:38px">Intelligence, quietly</span></div>
  <div class="spec"><span class="tag">display-sm · 36</span><span class="display-sm" style="font-size:28px">Sub-section heading</span></div>
  <p class="caption" style="margin:14px 0 0">Inter @ <b style="color:var(--ink)">weight 400</b>, tracking −2.5%. The signature choice: display never goes bold.</p>
</div>
</body>
</html>
